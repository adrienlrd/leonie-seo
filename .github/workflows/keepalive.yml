name: Keep-alive (anti cold start Render)

# Render Free met le service en veille après ~15 min d'inactivité. Le premier
# chargement marchand qui suit subit alors un cold start (~30 s) qui ruine le LCP
# et donc le critère de performance "Built for Shopify". Ce workflow pingue
# l'endpoint de santé à intervalle régulier pour garder l'instance chaude.
#
# Configuration (Settings → Secrets and variables → Actions → Variables) :
#   - BACKEND_HEALTH_URL : URL santé du backend Python (défaut: Render pilote)
#   - APP_HEALTH_URL     : URL santé de l'app Remix (optionnel, ex: .../healthz)
#
# Note coûts : garder un service Free éveillé consomme les heures gratuites
# (~750 h/mois pour le compte). Adapté à un seul service Free. La vraie solution
# pérenne reste un plan payant sans mise en veille.
#
# Le planificateur ne s'active que depuis la branche par défaut (après merge).

on:
  schedule:
    - cron: "*/10 * * * *" # toutes les 10 min (< fenêtre d'inactivité de 15 min)
  workflow_dispatch: # déclenchement manuel

# Évite l'empilement si un ping (cold start) déborde sur le suivant.
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    name: Ping santé
    runs-on: ubuntu-latest
    steps:
      - name: Réveiller backend + app
        env:
          BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL || 'https://leonie-seo-pilot-api.onrender.com/health' }}
          APP_HEALTH_URL: ${{ vars.APP_HEALTH_URL }}
        run: |
          set -u
          ping_url() {
            url="$1"
            [ -z "$url" ] && return 0
            echo "Ping $url"
            # 1re requête après veille = cold start : timeout large + retries.
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 70 --retry 3 --retry-delay 5 --retry-all-errors "$url" || echo "000")
            echo "  -> HTTP $code"
            if [ "$code" != "200" ]; then
              echo "::warning title=Keep-alive::$url a répondu $code"
            fi
          }
          ping_url "$BACKEND_HEALTH_URL"
          ping_url "$APP_HEALTH_URL"
