name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]"

      - name: Generate test encryption key
        run: |
          echo "LEONIE_MASTER_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Lint backend
        run: ruff check .

      - name: Test backend
        env:
          LEONIE_REQUIRE_SESSION_TOKEN: "false"
          SHOPIFY_STORE_DOMAIN: testshop.myshopify.com
          SHOPIFY_ACCESS_TOKEN: shpat_test
          SHOPIFY_CLIENT_ID: test-client-id
          SHOPIFY_CLIENT_SECRET: test-client-secret
          SHOPIFY_SCOPES: read_products,write_products
          APP_URL: https://example.com
          INTERNAL_API_SECRET: test-internal-secret
          LEONIE_BILLING_ENABLED: "true"
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shopify-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: shopify-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
