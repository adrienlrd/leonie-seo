services:
  - type: web
    name: leonie-seo-pilot-web
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: shopify-app
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PGSSLMODE
        value: require
      - key: SHOPIFY_APP_URL
        value: https://leonie-seo-pilot-web.onrender.com
      - key: SCOPES
        value: read_products,write_products,read_orders,write_content,read_themes,write_themes
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_BACKEND_URL
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false

  - type: web
    name: leonie-seo-pilot-api
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -e ".[postgres,llm,niche]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    disk:
      name: leonie-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: APP_URL
        value: https://leonie-seo-pilot-web.onrender.com
      - key: DATA_DIR
        value: /app/data/raw
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders,write_content,read_themes,write_themes
      - key: LEONIE_REQUIRE_SESSION_TOKEN
        value: "true"
      - key: LEONIE_BILLING_MODE
        value: disabled
      - key: LEONIE_PILOT_SAFE_MODE
        value: "true"
      - key: LEONIE_THEME_WRITE_MODE
        value: review_safe
      - key: CORS_ALLOWED_ORIGINS
        value: https://leonie-seo-pilot-web.onrender.com
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LEONIE_MASTER_KEY
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_CONFIG
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://leonie-seo-pilot-api.onrender.com/api/google/gsc/callback
      - key: GOOGLE_GA4_REDIRECT_URI
        value: https://leonie-seo-pilot-api.onrender.com/api/google/ga4/callback
      - key: GOOGLE_OAUTH_STATE_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
