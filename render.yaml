services:
  - type: web
    name: leonie-seo-pilot-web
    runtime: node
    plan: free
    region: frankfurt
    rootDir: shopify-app
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    domains:
      - pilot.leoniedelacroix.com
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SHOPIFY_APP_URL
        value: https://pilot.leoniedelacroix.com
      - key: SCOPES
        value: read_products,write_products,read_orders
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_BACKEND_URL
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false

  - type: web
    name: leonie-seo-pilot-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -e ".[postgres,llm,niche]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: APP_URL
        value: https://pilot.leoniedelacroix.com
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders
      - key: LEONIE_REQUIRE_SESSION_TOKEN
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://pilot.leoniedelacroix.com
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LEONIE_MASTER_KEY
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
