faq_templates:
  soins_visage:
    - q: "Cette crème est-elle adaptée aux peaux sensibles ?"
      a: >-
        Oui. Notre formule est dermatologiquement testée et conçue sans parfums synthétiques ni parabènes.
        Elle convient aux peaux sensibles, mixtes et sèches.
        Recommandée par les dermatologues pour une hydratation sans irritation.
    - q: "Vos produits sont-ils certifiés bio ?"
      a: >-
        Nos soins sont formulés avec des ingrédients naturels certifiés.
        Retrouvez la liste INCI complète sur chaque fiche produit.
        Nous privilégions les certifications Ecocert et Cosmos Organic.

blog_templates:
  informational:
    intent: "Informatif (guide / conseil)"
    target_length: "1 000–1 500 mots"
    eeat_angle: >-
      Citer des études cliniques et recommandations dermatologiques.
      Expliquer les ingrédients clés et leur action.
      Témoignages de clientes avec avant/après.
    h2s:
      - "Comprendre les besoins de votre type de peau"
      - "Les ingrédients à privilégier (et ceux à éviter)"
      - "Notre formulation naturelle et certifiée"
      - "Comment intégrer ce soin dans votre routine"
      - "Questions fréquentes"
  soins_visage:
    intent: "Commercial (catégorie produit)"
    target_length: "800–1 000 mots"
    eeat_angle: >-
      Angle expertise : formulateur, laboratoire, certifications.
      Rassurer sur la transparence des ingrédients (INCI).
    h2s:
      - "Les actifs clés de cette formule"
      - "Pour quel type de peau ?"
      - "Comment l'utiliser (matin / soir / fréquence)"
      - "Ce que disent les dermatologues"
      - "FAQ"
