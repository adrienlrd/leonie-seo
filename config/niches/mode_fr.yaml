faq_templates:
  manteaux:
    - q: "Comment entretenir un manteau en laine ?"
      a: >-
        Lavage à sec recommandé ou lavage main à l'eau froide.
        Séchage à plat à l'ombre pour éviter la déformation.
        Ne jamais essorer. Brossez régulièrement avec une brosse à laine.
        Un entretien soigneux préserve la qualité et la durée de vie du vêtement.
    - q: "Vos manteaux sont-ils fabriqués en France ?"
      a: >-
        Oui, tous nos manteaux sont fabriqués dans nos ateliers français.
        Nous travaillons avec des façonniers partenaires locaux pour garantir
        un savoir-faire couture de qualité et des conditions de travail éthiques.

blog_templates:
  informational:
    intent: "Informatif (guide / conseil)"
    target_length: "1 000–1 500 mots"
    eeat_angle: >-
      Valoriser l'expertise des créateurs et stylistes.
      Expliquer les matières et leur provenance.
      Mettre en avant le savoir-faire artisanal français.
    h2s:
      - "Les critères d'un vêtement de qualité"
      - "Choisir des matières durables et éco-responsables"
      - "Le savoir-faire artisanal français"
      - "Notre sélection capsule intemporelle"
      - "Questions fréquentes"
  manteaux:
    intent: "Commercial (catégorie produit)"
    target_length: "800–1 000 mots"
    eeat_angle: >-
      Angle créateur : la coupe, les matières et la fabrication française.
      Valoriser l'investissement dans un manteau durable.
    h2s:
      - "Pourquoi investir dans un manteau de qualité"
      - "Les matières nobles : laine, cachemire, alpaga"
      - "Comment choisir sa coupe selon sa morphologie"
      - "Nos modèles fabriqués en France"
      - "Entretien et longévité"
