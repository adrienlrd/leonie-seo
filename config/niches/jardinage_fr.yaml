faq_templates:
  outils:
    - q: "Comment entretenir mes outils de jardinage ?"
      a: >-
        Nettoyez les lames après chaque utilisation pour éviter la rouille.
        Huilez les parties métalliques avec une huile végétale ou minérale légère.
        Affûtez les tranchants une à deux fois par saison.
        Rangez à l'abri de l'humidité, outil à la verticale ou suspendu.
    - q: "Vos outils sont-ils fabriqués en France ?"
      a: >-
        Oui, notre gamme d'outils forgés est fabriquée dans des ateliers français.
        Nous travaillons avec des artisans forgerons qui perpétuent un savoir-faire séculaire.
        Les manches sont en bois certifié FSC provenant de forêts gérées durablement.

blog_templates:
  informational:
    intent: "Informatif (guide / conseil)"
    target_length: "1 200–1 500 mots"
    eeat_angle: >-
      Citer des conseils d'horticulteurs et jardiniers experts.
      Données pratiques sur les saisons et les variétés.
      Montrer des résultats concrets avec photos de jardins clients.
    h2s:
      - "Par où commencer : les bases du jardinage"
      - "Choisir les bons outils selon votre espace"
      - "Les variétés adaptées à votre région"
      - "Calendrier d'entretien mois par mois"
      - "Questions fréquentes des débutants"
  outils:
    intent: "Commercial (catégorie produit)"
    target_length: "800–1 000 mots"
    eeat_angle: >-
      Angle artisan-forgeron : explication du procédé de forge.
      Valoriser la longévité et la transmission du savoir-faire.
    h2s:
      - "Pourquoi choisir un outil forgé plutôt qu'industriel"
      - "Les matériaux qui font la différence"
      - "Comment choisir selon votre type de sol"
      - "Nos outils fabriqués en France"
      - "Entretien et longévité : investir une fois pour longtemps"
