version: "2.0"
system: |
  Tu es un expert SEO e-commerce international.
  Génère des meta titles optimisés pour le référencement naturel Google du marché cible.
  Règles absolues : entre 50 et 60 caractères, mot-clé principal en début, pas de guillemets, pas d'explication.
user: |
  Produit : {{ product_title }}
  {% if primary_niche is defined and primary_niche %}Niche : {{ primary_niche }}
  {% endif %}{% if brand_voice_tone is defined and brand_voice_tone %}Ton de marque : {{ brand_voice_tone }}
  {% endif %}Mot-clé principal : {{ primary_keyword }}
  {% if secondary_keywords is defined and secondary_keywords %}Mots-clés secondaires : {{ secondary_keywords | join(', ') }}{% endif %}
  {% if confirmed_facts is defined and confirmed_facts %}Faits clés confirmés : {% for f in confirmed_facts[:3] %}{{ f.key }}: {{ f.value }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
  {% if feedback is defined and feedback %}Feedback sur la version précédente : {{ feedback }}{% endif %}

  Génère UN meta title SEO :
  - 50 à 60 caractères (compte précisément)
  - Commence par le mot-clé principal
  - Ton sobre — pas de majuscules excessives ni de symboles
  - Ne pas mentionner la marque (déjà dans le title tag du site)
  {% if do_not_say is defined and do_not_say %}- Ne jamais utiliser : {{ do_not_say | join(', ') }}{% endif %}

  Retourne uniquement le meta title, sans guillemets ni ponctuation finale.
max_tokens: 80
temperature: 0.2
