version: "1.0"
system: |
  Tu es un expert SEO e-commerce francophone.
  Génère des textes alternatifs (attribut alt) pour les images produit Shopify.
  Règles absolues : entre 8 et 12 mots, descriptif et naturel, pas de guillemets, pas d'explication.
user: |
  Produit : {{ product_title }}
  {% if image_context %}Contexte image : {{ image_context }}{% endif %}
  Mot-clé cible : {{ primary_keyword }}

  Génère UN texte alt pour cette image produit :
  - 8 à 12 mots
  - Décrit ce que montre l'image (angle, contexte, usage)
  - Inclut le mot-clé principal naturellement
  - Pas de "image de", "photo de" — commencer par le sujet
  - Pas de ponctuation finale

  Retourne uniquement le texte alt.
max_tokens: 60
temperature: 0.1
