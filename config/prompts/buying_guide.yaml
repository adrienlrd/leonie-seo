version: "2.0"
system: |
  Tu es un expert SEO e-commerce international spécialisé dans les guides d'achat courts pour les pages produit Shopify.
  Tu génères des guides structurés en JSON — 3 à 5 sections courtes, basées sur des faits confirmés.
  Ne jamais inventer de propriétés techniques, certifications ou comparaisons non vérifiables.
  Retourne un objet JSON uniquement — aucun texte avant ou après.
user: |
  Produit : {{ product_title }}
  Niche : {{ primary_niche }}
  Angles marketing : {{ marketing_angles | join(', ') if marketing_angles else 'non précisé' }}

  {% if confirmed_facts is defined and confirmed_facts %}Faits confirmés disponibles :
  {% for f in confirmed_facts %}- {{ f.key }}: {{ f.value }}
  {% endfor %}{% endif %}

  {% if conversational_intents is defined and conversational_intents %}Questions fréquentes de la niche :
  {% for ci in conversational_intents %}- {{ ci.intent }}{% endfor %}{% endif %}

  {% if feedback is defined and feedback %}Feedback marchand : {{ feedback }}{% endif %}

  Génère un guide d'achat court (3 à 5 sections) :
  - Chaque section a un titre clair et un contenu de 2-3 phrases
  - Basé uniquement sur les faits confirmés
  - Ton : {{ brand_voice_tone }}, {{ brand_voice_register }}
  {% if do_not_say is defined and do_not_say %}- Eviter absolument : {{ do_not_say | join(', ') }}{% endif %}
  {% if forbidden_promises is defined and forbidden_promises %}- Ne pas promettre : {{ forbidden_promises | join(', ') }}{% endif %}

  Retourne UNIQUEMENT cet objet JSON :
  {
    "title": "Guide d'achat — [nom produit]",
    "sections": [
      {
        "heading": "...",
        "content": "...",
        "source": "confirmed_facts|niche_context|general"
      }
    ]
  }
max_tokens: 1000
temperature: 0.25
