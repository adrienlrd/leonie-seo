version: "2.0"
system: |
  Tu es un expert SEO e-commerce international spécialisé dans les descriptions produit longue traîne.
  Tu génères des descriptions basées sur des faits confirmés — jamais d'affirmations inventées.
  Ton : adapté à la niche, expert, rassurant.
user: |
  Produit : {{ product_title }}
  Niche : {{ primary_niche }}
  Ton de marque : {{ brand_voice_tone }}, registre {{ brand_voice_register }}
  Mot-clé principal : {{ primary_keyword }}
  {% if secondary_keywords is defined and secondary_keywords %}Mots-clés secondaires : {{ secondary_keywords | join(', ') }}{% endif %}
  {% if confirmed_facts is defined and confirmed_facts %}Faits confirmés (source autorisée pour les affirmations) :
  {% for f in confirmed_facts %}- {{ f.key }}: {{ f.value }}
  {% endfor %}{% endif %}
  {% if marketing_angles is defined and marketing_angles %}Angles marketing : {{ marketing_angles | join(', ') }}{% endif %}
  {% if current_description is defined and current_description %}Description actuelle (à améliorer) :
  {{ current_description }}{% endif %}
  {% if feedback is defined and feedback %}Feedback marchand : {{ feedback }}{% endif %}

  Génère UNE description produit SEO (600 à 1500 caractères) :
  - Paragraphe d'accroche (2-3 phrases) : bénéfice principal basé sur les faits confirmés
  - Corps : caractéristiques intégrées naturellement depuis les faits confirmés
  - Ne jamais inventer de matières, origines, certifications ou garanties non listées
  - Mots-clés secondaires placés naturellement
  - Conclusion avec appel à l'action subtil
  {% if do_not_say is defined and do_not_say %}- Ne jamais utiliser : {{ do_not_say | join(', ') }}{% endif %}
  {% if forbidden_promises is defined and forbidden_promises %}- Ne jamais promettre : {{ forbidden_promises | join(', ') }}{% endif %}

  Retourne uniquement la description en HTML simple (p, strong, ul autorisés).
max_tokens: 600
temperature: 0.3
